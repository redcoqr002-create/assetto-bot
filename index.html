<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assetto Corsa Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; background: #121212; color: #fff; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; }
.card { background: #1f1f1f; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
</style>
</head>
<body>
<h1>🏎 Assetto Corsa Dashboard</h1>
<div class="card">
  <p><strong>Players:</strong> <span id="players">0/16</span></p>
  <p><strong>Track:</strong> <span id="track">Unknown</span></p>
  <p><strong>Car:</strong> <span id="car">Unknown</span></p>
  <p><strong>Time:</strong> <span id="time">Unknown</span></p>
  <p><strong>Weather:</strong> <span id="weather">Unknown</span></p>
</div>
<canvas id="playerChart" width="400" height="100"></canvas>

<script>
const ctx = document.getElementById('playerChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Players'],
    datasets: [{
      label: 'Players Online',
      data: [0],
      backgroundColor: ['#00ff88']
    }]
  },
  options: { scales: { y: { beginAtZero: true, max: 16 } } }
});

async function updateDashboard() {
  const res = await fetch('/api/server');
  const data = await res.json();

  document.getElementById('players').textContent = `${data.clients}/${data.maxclients}`;
  document.getElementById('track').textContent = data.track;
  document.getElementById('car').textContent = data.car;
  document.getElementById('time').textContent = data.time;
  document.getElementById('weather').textContent = data.weather;

  chart.data.datasets[0].data[0] = data.clients;
  chart.update();
}

setInterval(updateDashboard, 5000);
updateDashboard();
</script>
</body>
</html>
